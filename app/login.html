<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/images/favicon.png" type="image/png" sizes="any" />
  <link rel="apple-touch-icon" href="assets/images/favicon.png" />
  <title>Sign in · Witness World Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css?v=3" />
  <link rel="stylesheet" href="assets/css/auth-layout.css?v=1" />
  <style>
    .wwc-auth-wrap { min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:28px 20px 40px; box-sizing:border-box; }
    .wwc-auth-main { width:100%; max-width:480px; margin:0 auto; box-sizing:border-box; }
    .wwc-auth-brand { display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px; margin:0 auto 24px; font-weight:800; font-size:18px; color:#0b1220; text-decoration:none; }
    .wwc-auth-brand img { display:block; width:48px; height:48px; border-radius:12px; object-fit:cover; }
    .wwc-auth-brand span { display:block; width:100%; text-align:center; }
    .wwc-auth-card {
      max-width: 400px;
      margin: 0 auto;
      background: var(--wwc-white);
      border-radius: var(--wwc-radius-lg);
      padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(11, 18, 32, 0.08);
    }
    .wwc-auth-card h1 { margin: 0 0 8px; font-size: 24px; font-weight: 800; }
    .wwc-auth-card p { margin: 0 0 20px; color: var(--wwc-text-muted); font-size: 14px; }
    .wwc-field { margin-bottom: 14px; }
    .wwc-field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .wwc-field input {
      width: 100%;
      border: 1px solid rgba(11, 18, 32, 0.12);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
    }
    .wwc-auth-error { color: var(--wwc-danger); font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .wwc-auth-submit { width: 100%; padding: 14px; font-size: 15px; margin-top: 8px; }
    .wwc-auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--wwc-text-muted); }
    .wwc-auth-footer a { color: var(--wwc-primary-dark); font-weight: 700; }
  </style>
</head>
<body class="wwc-auth-page">
  <div class="wwc-auth-wrap">
    <main class="wwc-auth-main">
      <a href="../index.html" class="wwc-auth-brand">
        <img src="assets/images/logo.jpg" alt="" width="48" height="48" />
        <span>Witness World Connect</span>
      </a>
      <div class="wwc-auth-card">
        <h1>Sign in</h1>
        <p>Use the same account as the mobile app.</p>
        <div class="wwc-auth-error" id="login-error" hidden></div>
        <form id="login-form">
          <div class="wwc-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" />
          </div>
          <div class="wwc-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>
          <p style="text-align:right;margin:-6px 0 12px;font-size:13px"><a href="forgot-password.html" style="font-weight:700;color:var(--wwc-primary-dark)">Forgot password?</a></p>
          <button type="submit" class="wwc-btn wwc-btn-primary wwc-auth-submit" id="login-btn">Sign in</button>
        </form>
        <p class="wwc-auth-footer">No account? <a href="register.html">Create one</a></p>
      </div>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/page-init.js"></script>
  <script>
    (async function () {
      const ok = await WWC_PAGE.init({ authPage: true });
      if (!ok) return;

      const form = document.getElementById('login-form');
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.hidden = true;
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        try {
          WWC_API.setToken(null);
          const data = await WWC_API.apiPost('login.php', {
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }, true);
          if (data.token) WWC_API.setToken(data.token);
          const ret = new URLSearchParams(window.location.search).get('return');
          window.location.replace(ret || 'index.html');
        } catch (ex) {
          if (ex.data?.code === 'pending_otp') {
            sessionStorage.setItem('wwc_pending_otp_email', document.getElementById('email').value.trim().toLowerCase());
            window.location.href = 'register.html?step=otp';
            return;
          }
          errEl.textContent = ex.message || 'Sign in failed.';
          errEl.hidden = false;
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      });
    })();
  </script>
</body>
</html>
