<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Business directory · Witness World Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" /><link rel="stylesheet" href="assets/css/home.css" /><link rel="stylesheet" href="assets/css/browse.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
  <div class="wwc-app"><div id="wwc-shell-top"></div>
  <main class="wwc-main">
    <a href="index.html" class="wwc-back-link"><ion-icon name="arrow-back-outline"></ion-icon> Home</a>
    <div class="wwc-page-head"><h1 class="wwc-page-title">Business directory</h1><p class="wwc-page-sub" id="dir-hint">Select a country to browse businesses.</p></div>
    <div class="wwc-filters">
      <div class="wwc-search-row"><ion-icon name="search-outline"></ion-icon><input type="search" id="browse-search" placeholder="Search businesses…" /></div>
      <div class="wwc-filter-row"><button type="button" class="wwc-loc-btn" id="loc-btn"><ion-icon name="location-outline"></ion-icon><span id="loc-label">Select country</span></button>
        <select id="browse-category"><option value="">All categories</option></select>
        <button type="button" class="wwc-btn wwc-btn-sm wwc-btn-primary" id="browse-apply">Apply</button></div>
    </div>
    <div class="wwc-grid" id="browse-grid"><p class="wwc-empty">Select a country to browse businesses.</p></div>
  </main><div id="wwc-shell-bottom"></div></div>
  <div class="wwc-modal-backdrop" id="loc-modal" hidden><div class="wwc-modal-sheet"><h2 class="wwc-modal-title">Locations</h2><p class="wwc-modal-hint">Country is required for directory.</p>
    <button type="button" class="wwc-modal-row" data-loc-all>All locations</button><input type="search" class="wwc-modal-search" id="loc-country-search" placeholder="Search countries" />
    <div class="wwc-modal-list" id="loc-country-list"></div><div id="loc-state-section" hidden><p class="wwc-modal-subhead">US state (optional)</p><div class="wwc-modal-list" id="loc-state-list"></div></div>
    <button type="button" class="wwc-modal-done" data-loc-done>Done</button></div></div>
  <script src="assets/js/config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/utils.js"></script><script src="assets/js/cards.js"></script><script src="assets/js/location-filter.js"></script><script src="assets/js/page-init.js"></script><script src="assets/js/shell.js"></script><script src="assets/js/browse-directory.js"></script>
</body></html>
