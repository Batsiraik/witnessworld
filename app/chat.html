<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="assets/images/favicon.png" type="image/png" sizes="any" />
  <link rel="apple-touch-icon" href="assets/images/favicon.png" />
  <title>Chat · Witness World Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <style>
    .wwc-chat-wrap { display:flex; flex-direction:column; height:calc(100vh - var(--wwc-topnav-h) - var(--wwc-bottomnav-h) - 32px); max-height:700px; }
    @media (max-width:767px){ .wwc-chat-wrap { height:calc(100vh - var(--wwc-bottomnav-h) - 120px); } }
    #chat-messages { flex:1; overflow-y:auto; padding:12px 0; }
    .wwc-chat-form { display:flex; gap:8px; padding-top:12px; border-top:1px solid var(--wwc-line); }
    .wwc-chat-form input { flex:1; border:1px solid var(--wwc-line); border-radius:12px; padding:12px 14px; }
    .wwc-chat-form button { padding:12px 18px; }
  </style>
</head>
<body>
  <div class="wwc-app"><div id="wwc-shell-top"></div>
  <main class="wwc-main">
    <a href="messages.html" class="wwc-back-link"><ion-icon name="arrow-back-outline"></ion-icon> Messages</a>
    <h1 class="wwc-page-title" id="chat-title" style="margin-bottom:12px">Chat</h1>
    <div class="wwc-chat-wrap">
      <div id="chat-messages"></div>
      <form class="wwc-chat-form" id="chat-form">
        <input type="text" id="chat-input" placeholder="Type a message…" autocomplete="off" required />
        <button type="submit" class="wwc-btn wwc-btn-primary">Send</button>
      </form>
    </div>
  </main><div id="wwc-shell-bottom"></div></div>
  <script src="assets/js/config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/utils.js"></script><script src="assets/js/page-init.js"></script><script src="assets/js/shell.js"></script><script src="assets/js/chat.js"></script>
</body></html>
