<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/images/favicon.png" type="image/png" sizes="any" />
  <link rel="apple-touch-icon" href="assets/images/favicon.png" />
  <title>Create account · Witness World Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css?v=3" />
  <link rel="stylesheet" href="assets/css/auth-layout.css?v=1" />
  <style>
    .wwc-auth-wrap { min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:28px 20px 40px; box-sizing:border-box; }
    .wwc-auth-main { width:100%; max-width:480px; margin:0 auto; box-sizing:border-box; }
    .wwc-auth-brand { display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px; margin:0 auto 24px; font-weight:800; font-size:18px; color:#0b1220; text-decoration:none; }
    .wwc-auth-brand img { display:block; width:48px; height:48px; border-radius:12px; object-fit:cover; }
    .wwc-auth-brand span { display:block; width:100%; text-align:center; }
    .wwc-auth-card { max-width:480px; margin:0 auto; background:var(--wwc-white); border-radius:var(--wwc-radius-lg); padding:24px; box-shadow:0 4px 20px rgba(11,18,32,0.08); }
    .wwc-auth-card h1 { margin:0 0 8px; font-size:24px; font-weight:800; }
    .wwc-field { margin-bottom:12px; } .wwc-field label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; }
    .wwc-field input, .wwc-field select { width:100%; border:1px solid rgba(11,18,32,0.12); border-radius:12px; padding:11px 12px; font-size:14px; }
    .wwc-auth-error { color:var(--wwc-danger); font-size:13px; font-weight:600; margin-bottom:12px; }
    .wwc-auth-submit { width:100%; padding:14px; margin-top:8px; }
    .wwc-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  </style>
</head>
<body class="wwc-auth-page">
  <div class="wwc-auth-wrap">
    <main class="wwc-auth-main">
      <a href="../index.html" class="wwc-auth-brand">
        <img src="assets/images/logo.jpg" alt="" width="48" height="48" />
        <span>Witness World Connect</span>
      </a>
      <div class="wwc-auth-card">
        <h1>Create account</h1>
        <p style="color:var(--wwc-text-muted);font-weight:600;margin:0 0 16px">Same account works on web and mobile app.</p>
        <div class="wwc-auth-error" id="reg-error" hidden></div>
        <form id="reg-form">
          <div class="wwc-grid-2">
            <div class="wwc-field"><label>First name</label><input id="first_name" required /></div>
            <div class="wwc-field"><label>Last name</label><input id="last_name" required /></div>
          </div>
          <div class="wwc-field"><label>Email</label><input type="email" id="email" required /></div>
          <div class="wwc-field"><label>Username</label><input id="username" required /></div>
          <div class="wwc-field"><label>Phone</label><input id="phone" required /></div>
          <div class="wwc-field"><label for="dob">Date of birth</label><input type="date" id="dob" required /></div>
          <div class="wwc-field"><label for="member_type">Member type</label>
            <select id="member_type" required>
              <option value="">Select member type</option>
              <option value="Unbaptized publisher">Unbaptized publisher</option>
              <option value="Baptized publisher">Baptized publisher</option>
              <option value="Pioneer">Pioneer</option>
              <option value="Servant">Servant</option>
              <option value="Elder">Elder</option>
            </select>
          </div>
          <div class="wwc-field"><label for="baptism_date" id="baptism_label">Baptism date</label><input type="date" id="baptism_date" /></div>
          <div class="wwc-field"><label>Country</label><select id="country" required><option value="">Select country</option></select></div>
          <div class="wwc-field"><label>Password</label><input type="password" id="password" required minlength="8" /></div>
          <button type="submit" class="wwc-btn wwc-btn-primary wwc-auth-submit" id="reg-btn">Create account</button>
        </form>
        <div id="otp-box" hidden>
          <h2 style="font-size:18px;font-weight:800;margin:0 0 8px">Verify your email</h2>
          <p style="font-size:14px;color:var(--wwc-text-muted)">Code sent to <strong id="otp-email"></strong></p>
          <p style="font-size:13px;color:var(--wwc-text-muted);line-height:1.5;margin:8px 0 0">If you don&apos;t see the email within a few minutes, please check your <strong>spam or junk</strong> folder — your code may have been filtered there.</p>
          <form id="otp-form" style="margin-top:16px">
            <div class="wwc-field"><label>6-digit code</label><input id="otp" inputmode="numeric" maxlength="6" required /></div>
            <button type="submit" class="wwc-btn wwc-btn-primary wwc-auth-submit" id="otp-btn">Verify &amp; sign in</button>
            <button type="button" class="wwc-btn wwc-btn-ghost wwc-auth-submit" id="otp-resend-btn" style="margin-top:10px">Resend code</button>
          </form>
        </div>
        <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--wwc-text-muted)">Already have an account? <a href="login.html" style="font-weight:800;color:var(--wwc-primary-dark)">Sign in</a></p>
      </div>
    </main>
  </div>
  <script src="assets/js/config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/utils.js"></script><script src="assets/js/page-init.js"></script><script src="assets/js/register.js"></script>
</body></html>
