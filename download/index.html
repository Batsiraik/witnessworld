<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Witness World Connect</title>
  <meta name="description" content="Download Witness World Connect for Android or iPhone. Find trusted services and businesses in our community." />
  <link rel="canonical" href="https://witnessworldconnect.com/download/" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="../favicon.png" type="image/png" sizes="any" />
  <link rel="apple-touch-icon" href="../favicon.png" />
  <style>
    :root {
      --blue: #1faaf2;
      --dark-blue: #0b1220;
      --accent: #1590d4;
      --light: #f8fcff;
      --text: #0b1220;
      --muted: #5c6b7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e5eaf3;
      padding: 18px 0;
    }
    .container { width: min(720px, 92%); margin: auto; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 900;
      color: var(--dark-blue);
      letter-spacing: -0.3px;
      text-decoration: none;
    }
    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(11, 18, 32, 0.1);
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(11, 18, 32, 0.08);
      border: 1px solid #e5eaf3;
      width: 100%;
    }
    h1 {
      font-size: clamp(28px, 5vw, 38px);
      color: var(--dark-blue);
      margin-bottom: 12px;
      line-height: 1.15;
    }
    p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #dbe7ff;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stores {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .store-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }
    .store-label {
      font-size: 15px;
      font-weight: 800;
      color: var(--dark-blue);
      letter-spacing: 0.01em;
    }
    .store-btn {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 22px;
      border-radius: 14px;
      transition: background 0.2s;
    }
    .store-btn:hover { background: var(--accent); }
    .store-btn.secondary {
      background: var(--dark-blue);
    }
    .store-btn.secondary:hover { background: #1a2438; }
    #fallback { display: none; }
    noscript .spinner-wrap { display: none; }
    noscript #fallback { display: block; }
    .back {
      display: inline-block;
      margin-top: 28px;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
  </style>
  <script>
    (function () {
      var PLAY = "https://play.google.com/store/apps/details?id=com.witnessworldconnect.app&pcampaignid=web_share";
      var APPLE = "https://apps.apple.com/zw/app/witness-world-connect/id6761303647";
      var ua = navigator.userAgent || navigator.vendor || window.opera || "";

      if (/android/i.test(ua)) {
        window.location.replace(PLAY);
        return;
      }
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.replace(APPLE);
        return;
      }

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("redirecting").style.display = "none";
        document.getElementById("fallback").style.display = "block";
      });
    })();
  </script>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">
        <img src="../app/assets/images/logo.jpg" alt="" width="40" height="40" />
        Witness World Connect
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card">
        <div id="redirecting">
          <div class="spinner"></div>
          <h1>Taking you to the app store…</h1>
          <p>Redirecting you to download Witness World Connect on your device.</p>
        </div>

        <div id="fallback">
          <h1>Download Witness World Connect</h1>
          <p>Tap the button that matches your phone.</p>
          <div class="stores">
            <div class="store-option">
              <span class="store-label">For Android</span>
              <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.witnessworldconnect.app&pcampaignid=web_share">Get it on Google Play</a>
            </div>
            <div class="store-option">
              <span class="store-label">For iPhones</span>
              <a class="store-btn secondary" href="https://apps.apple.com/zw/app/witness-world-connect/id6761303647">Download on App Store</a>
            </div>
          </div>
          <a class="back" href="/">← Back to website</a>
        </div>

        <noscript>
          <h1>Download Witness World Connect</h1>
          <p>Tap the button that matches your phone.</p>
          <div class="stores">
            <div class="store-option">
              <span class="store-label">For Android</span>
              <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.witnessworldconnect.app&pcampaignid=web_share">Get it on Google Play</a>
            </div>
            <div class="store-option">
              <span class="store-label">For iPhones</span>
              <a class="store-btn secondary" href="https://apps.apple.com/zw/app/witness-world-connect/id6761303647">Download on App Store</a>
            </div>
          </div>
          <a class="back" href="/">← Back to website</a>
        </noscript>
      </div>
    </div>
  </main>
</body>
</html>
